<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 10: Inequalities - Full Video Lesson</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-step { border-left: 4px solid #3b82f6; padding-left: 1rem; background: #f0f9ff; transition: all 0.3s; }
        .equation { font-family: 'Times New Roman', serif; font-style: italic; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center p-4 md:p-8">

    <!-- Header -->
    <div class="max-w-5xl w-full text-center mb-8">
        <h1 class="text-3xl font-bold text-slate-800">Chapter 10: Inequalities</h1>
        <p class="text-slate-600">Full 10-Question Step-by-Step Video Lesson</p>
    </div>

    <!-- Main Video Container -->
    <div class="max-w-6xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[650px]">
        
        <!-- Screen Area -->
        <div class="flex-1 bg-slate-900 p-8 relative flex flex-col justify-center text-white min-h-[450px]">
            <div id="slide-content" class="fade-in h-full flex flex-col justify-center">
                <!-- Content injected here -->
            </div>
            
            <!-- Controls Overlay -->
            <div class="absolute bottom-0 left-0 right-0 bg-black/60 p-4 flex justify-between items-center backdrop-blur-sm">
                <div class="flex gap-4 items-center">
                    <button id="prevBtn" class="p-2 hover:bg-white/20 rounded-full transition" title="Previous Question">
                        <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                    </button>
                    <span id="slideCounter" class="text-sm font-mono tracking-widest bg-white/10 px-3 py-1 rounded">1 / 10</span>
                    <button id="nextBtn" class="p-2 hover:bg-white/20 rounded-full transition" title="Next Question">
                        <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                    </button>
                </div>
                
                <div class="flex gap-3">
                    <button id="resetBtn" class="px-4 py-2 text-sm border border-white/30 rounded-full hover:bg-white/10 transition">Reset</button>
                    <button id="playBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-full font-bold transition flex items-center gap-2 shadow-lg active:scale-95">
                        <span id="playIcon">▶</span> <span id="btnText">Play Lesson</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Sidebar Explanation -->
        <div class="w-full md:w-96 bg-slate-50 p-6 border-l border-slate-200 flex flex-col">
            <h2 class="font-bold text-slate-700 mb-4 border-b pb-2 uppercase text-xs tracking-widest flex justify-between items-center">
                Logic Breakdown
                <span id="status-badge" class="px-2 py-0.5 bg-slate-200 text-[10px] rounded text-slate-500 italic">Idle</span>
            </h2>
            <div id="step-list" class="space-y-4 text-sm text-slate-600 flex-1 overflow-y-auto pr-2">
                <!-- Steps injected here -->
            </div>
            <div class="mt-4 p-4 bg-blue-50 rounded-lg text-xs text-blue-700 leading-relaxed border border-blue-100">
                <strong>Student Guide:</strong> Press the play button to hear the explanation for each line.
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "1. Find the least positive integer which satisfies x - 6 ≤ 2 - 3x.",
                steps: [
                    { text: "Original: x - 6 ≤ 2 - 3x", audio: "Let's find the least positive integer. We start with x minus 6 is less than or equal to 2 minus 3 x." },
                    { text: "Combine x: 4x ≤ 8", audio: "Add 3x and 6 to both sides to get 4x is less than or equal to 8." },
                    { text: "Solve: x ≤ 2", audio: "Divide by 4. So x is 2 or less." },
                    { text: "Positive Integers: {1, 2}", audio: "The positive integers fitting this are 1 and 2." },
                    { text: "Least Value: 1", audio: "The smallest of these is 1." }
                ],
                answer: "C"
            },
            {
                q: "2. If a/b > 1, which must be true? (I) a > b (II) a² > b² (III) ab > 0",
                steps: [
                    { text: "Analyze I: If b < 0, then a < b", audio: "If b is negative, like negative 2, then a must be negative 4 for the ratio to be 2. In that case, negative 4 is not greater than negative 2. So I is not always true." },
                    { text: "Analyze II: (a/b)² > 1² → a²/b² > 1", audio: "Since the absolute value of the ratio is greater than 1, squaring both sides confirms a squared is always greater than b squared." },
                    { text: "Analyze III: a/b > 1 → ab > 0", audio: "For the ratio to be positive, both numbers must have the same sign. Therefore their product is always positive." }
                ],
                answer: "D"
            },
            {
                q: "3. Solve x + 9 < 8 or 3(5 + x) < -12.",
                steps: [
                    { text: "Part A: x < -1", audio: "Subtract 9 from the first inequality to get x is less than negative 1." },
                    { text: "Part B: 5 + x < -4 → x < -9", audio: "Divide the second part by 3, then subtract 5. x is less than negative 9." },
                    { text: "Combine (OR): x < -1", audio: "Since x less than negative 1 already includes all numbers less than negative 9, the union of these sets is just x less than negative 1." }
                ],
                answer: "A"
            },
            {
                q: "4. Solve (x - 2)/3 - (x - 3)/4 ≥ 1.",
                steps: [
                    { text: "Multiply by 12: 4(x - 2) - 3(x - 3) ≥ 12", audio: "Multiply the entire inequality by 12 to remove the denominators." },
                    { text: "Expand: 4x - 8 - 3x + 9 ≥ 12", audio: "Expand the brackets, being careful with the negative signs." },
                    { text: "Simplify: x + 1 ≥ 12", audio: "4x minus 3x is x, and negative 8 plus 9 is 1." },
                    { text: "Result: x ≥ 11", audio: "Subtract 1 to find x is 11 or greater." }
                ],
                answer: "D"
            },
            {
                q: "5. Find the greatest integer: (1-x)/2 > 3x - 10 or 2x + 7 ≤ 1.",
                steps: [
                    { text: "Inequality A: x < 3", audio: "Solving the first part, we find x is strictly less than 3." },
                    { text: "Inequality B: x ≤ -3", audio: "Solving the second part, we find x is negative 3 or less." },
                    { text: "Combine (OR): x < 3", audio: "The combined solution is x less than 3." },
                    { text: "Greatest Integer: 2", audio: "The largest whole number strictly less than 3 is 2." }
                ],
                answer: "C"
            },
            {
                q: "6. Solve the inequality (2x - 3)(x + 5) > 0.",
                steps: [
                    { text: "Roots: x = 1.5, x = -5", audio: "The expression is zero at 1 point 5 and negative 5." },
                    { text: "Condition: Product > 0", audio: "We want the product to be positive." },
                    { text: "Solution: x < -5 or x > 1.5", audio: "This happens when both factors are negative, or both are positive. This corresponds to the outer regions." }
                ],
                answer: "B"
            },
            {
                q: "7. Solve x² - x - 2 < 0.",
                steps: [
                    { text: "Factor: (x + 1)(x - 2) < 0", audio: "Factor the quadratic into x plus 1 times x minus 2." },
                    { text: "Roots: -1 and 2", audio: "The critical values are negative 1 and positive 2." },
                    { text: "Range: -1 < x < 2", audio: "Since we want the part less than zero, we take the interval between the roots." }
                ],
                answer: "D"
            },
            {
                q: "8. Solve the inequality represented by the graph (y = 2(x+1)² - 32 < 0).",
                steps: [
                    { text: "Find intercepts: 2(x + 1)² = 32", audio: "Set the equation to zero to find the x-intercepts." },
                    { text: "Solve: (x + 1)² = 16 → x = 3, -5", audio: "The intercepts are at 3 and negative 5." },
                    { text: "Interpret Graph: x < -5 or x > 3", audio: "Based on the provided solution graph, the shaded area is in the outer regions." }
                ],
                answer: "A"
            },
            {
                q: "9. Find max integral k such that x² - 2kx + 2 - k ≥ 0 for all x.",
                steps: [
                    { text: "Discriminant: Δ ≤ 0", audio: "For the quadratic to never be negative, the discriminant must be 0 or less." },
                    { text: "Calc: 4k² - 4(2 - k) ≤ 0", audio: "This simplifies to k squared plus k minus 2 is less than or equal to zero." },
                    { text: "Range: -2 ≤ k ≤ 1", audio: "Factorizing gives k between negative 2 and 1." },
                    { text: "Max Integer: 1", audio: "The largest integer in this range is 1." }
                ],
                answer: "B"
            },
            {
                q: "10. Find k such that y = x² + kx + 9 and y = 2x - 7 have 2 intersections.",
                steps: [
                    { text: "Form Eq: x² + (k - 2)x + 16 = 0", audio: "Equate both expressions and move everything to one side." },
                    { text: "Condition: Δ > 0", audio: "Two intersections mean the discriminant must be positive." },
                    { text: "Solve: (k - 2)² > 64", audio: "Taking the root, k minus 2 is greater than 8 or less than negative 8." },
                    { text: "Final: k < -6 or k > 10", audio: "This gives our final solution for k." }
                ],
                answer: "D"
            }
        ];

        let currentQIndex = 0;
        let isPlaying = false;
        const apiKey = ""; 

        const slideContent = document.getElementById('slide-content');
        const stepList = document.getElementById('step-list');
        const slideCounter = document.getElementById('slideCounter');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const btnText = document.getElementById('btnText');
        const statusBadge = document.getElementById('status-badge');

        function updateSlide() {
            const q = questions[currentQIndex];
            slideCounter.innerText = `${currentQIndex + 1} / ${questions.length}`;
            statusBadge.innerText = "Idle";
            statusBadge.className = "px-2 py-0.5 bg-slate-200 text-[10px] rounded text-slate-500 italic";
            
            slideContent.innerHTML = `
                <div class="mb-6">
                    <span class="text-blue-400 text-xs font-bold uppercase tracking-widest bg-blue-400/10 px-2 py-1 rounded">Problem ${currentQIndex + 1}</span>
                    <p class="text-xl md:text-2xl font-medium mt-4 leading-relaxed">${q.q}</p>
                </div>
                <div id="solution-box" class="space-y-3"></div>
                <div id="answer-reveal" class="mt-auto pt-4 text-2xl font-bold text-green-400 opacity-0 transition-opacity duration-1000 flex items-center gap-2">
                    <span class="text-3xl">✓</span> Correct Answer: ${q.answer}
                </div>
            `;
            
            stepList.innerHTML = '';
            q.steps.forEach((step, idx) => {
                const div = document.createElement('div');
                div.id = `step-item-${idx}`;
                div.className = "text-slate-500 transition-all duration-500 p-2 rounded cursor-default";
                div.innerText = step.text;
                stepList.appendChild(div);
            });
            
            isPlaying = false;
            playIcon.innerText = "▶";
            btnText.innerText = "Play Lesson";
            playBtn.classList.remove('opacity-50');
        }

        async function speak(text) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                        }
                    })
                });
                
                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                const audioBlob = pcmToWav(audioData, 24000);
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                return new Promise(resolve => {
                    audio.onended = resolve;
                    audio.play();
                });
            } catch (e) {
                return new Promise(resolve => setTimeout(resolve, 2500));
            }
        }

        function pcmToWav(base64, sampleRate) {
            const buffer = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + buffer.byteLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, buffer.byteLength, true);
            return new Blob([wavHeader, buffer], { type: 'audio/wav' });
        }

        async function playLesson() {
            if (isPlaying) return;
            isPlaying = true;
            playBtn.classList.add('opacity-50');
            playIcon.innerText = "⏳";
            btnText.innerText = "Playing...";
            statusBadge.innerText = "Recording";
            statusBadge.className = "px-2 py-0.5 bg-blue-100 text-[10px] rounded text-blue-600 font-bold animate-pulse";

            const q = questions[currentQIndex];
            const solutionBox = document.getElementById('solution-box');
            solutionBox.innerHTML = '';

            for (let i = 0; i < q.steps.length; i++) {
                if (!isPlaying) break;
                const stepItems = stepList.querySelectorAll('div');
                stepItems.forEach(item => item.classList.remove('active-step', 'text-blue-600', 'font-bold'));
                const currentItem = document.getElementById(`step-item-${i}`);
                currentItem.classList.add('active-step', 'text-blue-600', 'font-bold');

                const stepDiv = document.createElement('div');
                stepDiv.className = "fade-in text-lg font-mono bg-white/5 p-3 rounded border border-white/10 shadow-sm";
                stepDiv.innerHTML = `<span class="text-blue-400 mr-2 font-bold">Step ${i+1}:</span> ${q.steps[i].text}`;
                solutionBox.appendChild(stepDiv);

                await speak(q.steps[i].audio);
            }

            if (isPlaying) {
                document.getElementById('answer-reveal').style.opacity = '1';
                await speak(`The final answer is ${q.answer}.`);
            }

            isPlaying = false;
            playBtn.classList.remove('opacity-50');
            playIcon.innerText = "▶";
            btnText.innerText = "Replay Lesson";
            statusBadge.innerText = "Done";
            statusBadge.className = "px-2 py-0.5 bg-green-100 text-[10px] rounded text-green-600 font-bold";
        }

        document.getElementById('nextBtn').onclick = () => { if(!isPlaying) { currentQIndex = (currentQIndex + 1) % questions.length; updateSlide(); }};
        document.getElementById('prevBtn').onclick = () => { if(!isPlaying) { currentQIndex = (currentQIndex - 1 + questions.length) % questions.length; updateSlide(); }};
        document.getElementById('resetBtn').onclick = () => { if(!isPlaying) updateSlide(); };
        playBtn.onclick = playLesson;

        window.onload = updateSlide;
    </script>
</body>
</html>
